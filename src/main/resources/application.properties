spring.application.name=EcosDaGuerra

# PostgreSQL
spring.datasource.url=jdbc:postgresql://127.0.0.1:5432/ecos_guerra_db
spring.datasource.username=postgres
spring.datasource.password=mlovatto

# JPA
spring.jpa.hibernate.ddl-auto=validate

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.url=jdbc:postgresql://127.0.0.1:5432/ecos_guerra_db
spring.flyway.user=postgres
spring.flyway.password=mlovatto

# Redis
spring.cache.type=redis
spring.data.redis.port=6380
spring.cache.redis.time-to-live=10s